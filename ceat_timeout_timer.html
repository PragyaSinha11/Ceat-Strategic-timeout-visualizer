<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEAT Strategic Timeout</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #040810;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  /* Animated background */
  .bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, #0a1a3a 0%, #040810 60%);
    z-index: 0;
  }

  .bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 300px at 20% 80%, rgba(0,100,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 400px 200px at 80% 20%, rgba(255,200,0,0.04) 0%, transparent 70%);
  }

  /* Light streaks */
  .streak {
    position: fixed;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,150,255,0.3), transparent);
    z-index: 0;
    animation: streakMove linear infinite;
  }

  @keyframes streakMove {
    from { transform: translateX(-100vw); }
    to { transform: translateX(100vw); }
  }

  /* Particles */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: particleDrift linear infinite;
  }

  @keyframes particleDrift {
    0% { transform: translateY(110vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* Scene container */
  .scene {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* Header */
  .header {
    text-align: center;
    animation: fadeInDown 0.8s ease both;
  }

  .header-top {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 6px;
    color: #6090c0;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .header-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #c8d8f0;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .header-title span {
    color: #f0c020;
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Main tire container */
  .tire-scene {
    position: relative;
    width: 420px;
    height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: scaleIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.3) rotate(-20deg); }
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* Rocking wrapper - the tilt axis */
  .rock-wrapper {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: rock 4s ease-in-out infinite;
    transform-style: preserve-3d;
    perspective: 800px;
  }

  @keyframes rock {
    0%   { transform: perspective(800px) rotateY(0deg); }
    20%  { transform: perspective(800px) rotateY(35deg); }
    50%  { transform: perspective(800px) rotateY(0deg); }
    70%  { transform: perspective(800px) rotateY(-35deg); }
    100% { transform: perspective(800px) rotateY(0deg); }
  }

  /* Ground glow */
  .ground-glow {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    height: 40px;
    background: radial-gradient(ellipse, rgba(0,120,255,0.25) 0%, transparent 70%);
    border-radius: 50%;
    animation: glowPulse 2s ease-in-out infinite alternate;
  }

  @keyframes glowPulse {
    from { opacity: 0.5; transform: translateX(-50%) scaleX(0.8); }
    to { opacity: 1; transform: translateX(-50%) scaleX(1.2); }
  }

  /* Tire ring wrapper (spins) */
  .tire-spin {
    width: 380px;
    height: 380px;
    position: relative;
    animation: tireSpin 3s linear infinite;
    border-radius: 50%;
  }

  @keyframes tireSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Actual tire SVG drawn using CSS */
  .tire-body {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    position: relative;
    background:
      /* Outer tread - dark rubber */
      radial-gradient(circle at 50% 50%,
        transparent 42%,
        #151515 42%,
        #0a0a0a 48%,
        #1a1a1a 50%,
        #0d0d0d 52%,
        #151515 55%,
        #0a0a0a 58%,
        #1c1c1c 60%,
        #080808 62%,
        #181818 65%
      );
    box-shadow:
      0 0 0 2px #2a2a2a,
      inset 0 0 30px rgba(0,0,0,0.8),
      0 0 40px rgba(0,80,200,0.15);
  }

  /* Tread grooves using SVG overlay */
  .tire-tread-svg {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
  }

  /* Wheel hub (counter-rotates to stay "still") */
  .hub-wrapper {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: counterSpin 3s linear infinite;
  }

  @keyframes counterSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
  }

  /* Alloy wheel design */
  .wheel-hub {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    position: relative;
    background:
      radial-gradient(circle at 40% 35%,
        #d0d0d5 0%,
        #888890 20%,
        #5a5a65 40%,
        #3a3a45 55%,
        #252530 70%,
        #1a1a22 85%
      );
    box-shadow:
      inset 0 2px 8px rgba(255,255,255,0.15),
      inset 0 -2px 8px rgba(0,0,0,0.5),
      0 0 0 3px #2a2a35,
      0 0 0 5px #1a1a22;
  }

  /* Spokes SVG */
  .spokes-svg {
    position: absolute;
    inset: 0;
  }

  /* Center cap */
  .center-cap {
    position: absolute;
    inset: 50%;
    transform: translate(-50%, -50%);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #888, #333 60%, #111);
    box-shadow:
      0 0 0 4px #1a1a22,
      0 0 0 6px #333;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  /* Timer overlay - stays centered via counter-rotation from rock */
  .timer-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
  }

  .timer-display {
    font-family: 'Orbitron', monospace;
    font-size: 64px;
    font-weight: 900;
    color: #00e5ff;
    text-shadow:
      0 0 10px rgba(0,229,255,0.9),
      0 0 25px rgba(0,229,255,0.6),
      0 0 50px rgba(0,180,255,0.4),
      0 0 80px rgba(0,120,255,0.2);
    letter-spacing: 4px;
    line-height: 1;
    animation: timerPulse 1s ease-in-out infinite alternate;
  }

  @keyframes timerPulse {
    from { text-shadow: 0 0 10px rgba(0,229,255,0.9), 0 0 25px rgba(0,229,255,0.6), 0 0 50px rgba(0,180,255,0.4); }
    to { text-shadow: 0 0 15px rgba(0,229,255,1), 0 0 40px rgba(0,229,255,0.8), 0 0 80px rgba(0,180,255,0.6), 0 0 120px rgba(0,100,255,0.3); }
  }

  .timer-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: rgba(0,200,255,0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* CEAT badge on tire */
  .ceat-badge {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    z-index: 25;
    pointer-events: none;
  }

  .ceat-c { color: #ffffff; }
  .ceat-e { color: #f0c020; }
  .ceat-a { color: #f0c020; }
  .ceat-t { color: #f0c020; }

  /* Progress arc */
  .progress-ring-svg {
    position: absolute;
    inset: -10px;
    width: calc(100% + 20px);
    height: calc(100% + 20px);
    z-index: 5;
    pointer-events: none;
  }

  .progress-track {
    fill: none;
    stroke: rgba(0,80,160,0.2);
    stroke-width: 3;
  }

  .progress-fill {
    fill: none;
    stroke: url(#progressGrad);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }

  /* Tick marks ring */
  .tick-ring {
    position: absolute;
    inset: -25px;
    width: calc(100% + 50px);
    height: calc(100% + 50px);
    z-index: 4;
    pointer-events: none;
  }

  /* Footer */
  .footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: fadeInUp 1s 0.5s ease both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 10px 28px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(0,150,255,0.15);
    border-radius: 40px;
    backdrop-filter: blur(10px);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00e5ff;
    box-shadow: 0 0 8px #00e5ff;
    animation: dotBlink 1s step-end infinite;
  }

  @keyframes dotBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .status-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #6090c0;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .ipl-brand {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    color: rgba(96,144,192,0.5);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* Urgency mode (last 10 seconds) */
  .urgency-mode .timer-display {
    color: #ff4040;
    animation: urgentPulse 0.5s ease-in-out infinite alternate;
  }

  @keyframes urgentPulse {
    from {
      text-shadow: 0 0 10px rgba(255,60,0,0.9), 0 0 30px rgba(255,40,0,0.7), 0 0 60px rgba(255,0,0,0.5);
      transform: scale(1);
    }
    to {
      text-shadow: 0 0 20px rgba(255,80,0,1), 0 0 50px rgba(255,60,0,0.9), 0 0 100px rgba(255,20,0,0.7);
      transform: scale(1.03);
    }
  }

  .urgency-mode .status-dot {
    background: #ff4040;
    box-shadow: 0 0 12px #ff4040;
    animation: dotBlink 0.4s step-end infinite;
  }

  .urgency-mode .progress-fill {
    stroke: url(#urgentGrad);
  }

  /* Finished state */
  .finished .timer-display {
    color: #f0c020;
    animation: finishPulse 0.8s ease-in-out 3;
  }

  @keyframes finishPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); text-shadow: 0 0 30px rgba(240,192,0,1), 0 0 60px rgba(240,192,0,0.8); }
    100% { transform: scale(1); }
  }

  .finished .tire-spin {
    animation-play-state: paused;
    animation: tireSpin 3s linear 1 forwards, tireSlowdown 2s 3s ease-in forwards;
  }

  @keyframes tireSlowdown {
    from { transform: rotate(360deg); animation-timing-function: ease-out; }
    to { transform: rotate(440deg); }
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }

  .ctrl-btn {
    padding: 8px 20px;
    border-radius: 24px;
    border: 1px solid rgba(0,150,255,0.3);
    background: rgba(0,80,160,0.15);
    color: #6090c0;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ctrl-btn:hover {
    background: rgba(0,100,200,0.3);
    border-color: rgba(0,180,255,0.5);
    color: #90c0e0;
    box-shadow: 0 0 15px rgba(0,120,255,0.2);
  }

  .ctrl-btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<div class="bg"></div>

<!-- Light streaks -->
<div class="streak" style="top:20%; width:60%; animation-duration:8s; animation-delay:-2s; opacity:0.4;"></div>
<div class="streak" style="top:50%; width:40%; animation-duration:11s; animation-delay:-5s; opacity:0.25;"></div>
<div class="streak" style="top:75%; width:50%; animation-duration:7s; animation-delay:-3s; opacity:0.3;"></div>

<div class="scene" id="scene">

  <div class="header">
    <div class="header-top">IPL 2026 · Official Timeout</div>
    <div class="header-title"><span>CEAT</span> Strategic Timeout</div>
  </div>

  <div class="tire-scene" id="tireScene">

    <!-- Ground reflection glow -->
    <div class="ground-glow"></div>

    <!-- Progress ring -->
    <svg class="progress-ring-svg" viewBox="0 0 440 440" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#00e5ff"/>
          <stop offset="100%" stop-color="#0080ff"/>
        </linearGradient>
        <linearGradient id="urgentGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ff6020"/>
          <stop offset="100%" stop-color="#ff2000"/>
        </linearGradient>
      </defs>
      <!-- Tick marks -->
      <g id="ticks"></g>
      <!-- Progress track -->
      <circle class="progress-track" cx="220" cy="220" r="207" transform="rotate(-90 220 220)"/>
      <!-- Progress fill -->
      <circle class="progress-fill" id="progressArc" cx="220" cy="220" r="207"
        transform="rotate(-90 220 220)"
        stroke-dasharray="1300"
        stroke-dashoffset="0"/>
    </svg>

    <!-- Rock wrapper -->
    <div class="rock-wrapper" id="rockWrapper">

      <!-- Tire spin wrapper -->
      <div class="tire-spin" id="tireSpin">
        <div class="tire-body">

          <!-- Tread pattern SVG -->
          <svg class="tire-tread-svg" viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <clipPath id="tireClip">
                <circle cx="190" cy="190" r="190"/>
              </clipPath>
              <clipPath id="outerClip">
                <path d="M190 190 m-190,0 a190,190 0 1,1 380,0 a190,190 0 1,1 -380,0 M190 190 m-125,0 a125,125 0 1,0 250,0 a125,125 0 1,0 -250,0"/>
              </clipPath>
            </defs>
            <!-- Tread grooves - radial lines -->
            <g clip-path="url(#outerClip)" opacity="0.5">
              <!-- Radial tread lines -->
              <line x1="190" y1="0" x2="190" y2="380" stroke="#050505" stroke-width="4"/>
              <line x1="0" y1="190" x2="380" y2="190" stroke="#050505" stroke-width="4"/>
              <line x1="0" y1="0" x2="380" y2="380" stroke="#050505" stroke-width="3"/>
              <line x1="380" y1="0" x2="0" y2="380" stroke="#050505" stroke-width="3"/>
              <!-- More radial lines at 22.5deg intervals -->
              <line x1="190" y1="190" x2="380" y2="95" stroke="#080808" stroke-width="2.5" stroke-dasharray="8,4"/>
              <line x1="190" y1="190" x2="285" y2="0" stroke="#080808" stroke-width="2.5" stroke-dasharray="8,4"/>
              <line x1="190" y1="190" x2="95" y2="0" stroke="#080808" stroke-width="2.5" stroke-dasharray="8,4"/>
              <line x1="190" y1="190" x2="0" y2="95" stroke="#080808" stroke-width="2.5" stroke-dasharray="8,4"/>
              <line x1="190" y1="190" x2="0" y2="285" stroke="#080808" stroke-width="2.5" stroke-dasharray="8,4"/>
              <line x1="190" y1="190" x2="95" y2="380" stroke="#080808" stroke-width="2.5" stroke-dasharray="8,4"/>
              <line x1="190" y1="190" x2="285" y2="380" stroke="#080808" stroke-width="2.5" stroke-dasharray="8,4"/>
              <line x1="190" y1="190" x2="380" y2="285" stroke="#080808" stroke-width="2.5" stroke-dasharray="8,4"/>
              <!-- Circumferential rings -->
              <circle cx="190" cy="190" r="185" fill="none" stroke="#080808" stroke-width="1.5" opacity="0.8"/>
              <circle cx="190" cy="190" r="170" fill="none" stroke="#0a0a0a" stroke-width="2" opacity="0.6"/>
              <circle cx="190" cy="190" r="155" fill="none" stroke="#080808" stroke-width="1.5" opacity="0.6"/>
              <circle cx="190" cy="190" r="140" fill="none" stroke="#0a0a0a" stroke-width="1" opacity="0.4"/>
            </g>
            <!-- Subtle metallic sheen on tire edge -->
            <circle cx="190" cy="190" r="187" fill="none"
              stroke="url(#sheen)" stroke-width="6"/>
            <defs>
              <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
                <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
              </linearGradient>
            </defs>
          </svg>

          <!-- CEAT text on tire sidewall -->
          <div class="ceat-badge">
            <span class="ceat-c">C</span><span class="ceat-e">E</span><span class="ceat-a">A</span><span class="ceat-t">T</span>
          </div>

          <!-- Alloy wheel hub (counter-rotates) -->
          <div class="hub-wrapper">
            <div class="wheel-hub">

              <!-- Spokes SVG -->
              <svg class="spokes-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- 5 spokes like the reference image -->
                <g transform="translate(100,100)">
                  <!-- Spoke 1 - top -->
                  <path d="M-12,-28 L-18,-90 Q0,-98 18,-90 L12,-28 Z"
                    fill="url(#spokeGrad)" opacity="0.95"/>
                  <!-- Spoke 2 - bottom-right -->
                  <path d="M-12,-28 L-18,-90 Q0,-98 18,-90 L12,-28 Z"
                    fill="url(#spokeGrad)" opacity="0.95"
                    transform="rotate(72)"/>
                  <!-- Spoke 3 - left-bottom -->
                  <path d="M-12,-28 L-18,-90 Q0,-98 18,-90 L12,-28 Z"
                    fill="url(#spokeGrad)" opacity="0.9"
                    transform="rotate(144)"/>
                  <!-- Spoke 4 - right-top -->
                  <path d="M-12,-28 L-18,-90 Q0,-98 18,-90 L12,-28 Z"
                    fill="url(#spokeGrad)" opacity="0.85"
                    transform="rotate(216)"/>
                  <!-- Spoke 5 - left-top -->
                  <path d="M-12,-28 L-18,-90 Q0,-98 18,-90 L12,-28 Z"
                    fill="url(#spokeGrad)" opacity="0.9"
                    transform="rotate(288)"/>
                </g>
                <defs>
                  <linearGradient id="spokeGrad" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="#606070"/>
                    <stop offset="40%" stop-color="#909098"/>
                    <stop offset="100%" stop-color="#484850"/>
                  </linearGradient>
                </defs>
                <!-- Bolt holes between spokes -->
                <g transform="translate(100,100)">
                  <circle cx="0" cy="-62" r="5" fill="#1a1a22"/>
                  <circle cx="0" cy="-62" r="5" fill="#1a1a22" transform="rotate(72)"/>
                  <circle cx="0" cy="-62" r="5" fill="#1a1a22" transform="rotate(144)"/>
                  <circle cx="0" cy="-62" r="5" fill="#1a1a22" transform="rotate(216)"/>
                  <circle cx="0" cy="-62" r="5" fill="#1a1a22" transform="rotate(288)"/>
                </g>
              </svg>

              <!-- Center cap -->
              <div class="center-cap">
                <svg viewBox="0 0 40 40" width="28" height="28">
                  <circle cx="20" cy="20" r="18" fill="none" stroke="#555" stroke-width="1"/>
                  <text x="20" y="25" text-anchor="middle" font-size="9" font-weight="700"
                    fill="#aaa" font-family="Rajdhani,sans-serif" letter-spacing="0.5">CEAT</text>
                </svg>
              </div>

            </div>
          </div>
          <!-- end hub-wrapper -->

        </div>
        <!-- end tire-body -->
      </div>
      <!-- end tire-spin -->

      <!-- Timer overlay - sits inside rock-wrapper, counter-rotates via JS to stay readable -->
      <div class="timer-overlay" id="timerOverlay">
        <div class="timer-display" id="timerDisplay">02:30</div>
        <div class="timer-label">Strategic Timeout</div>
      </div>

    </div>
    <!-- end rock-wrapper -->

  </div>
  <!-- end tire-scene -->

  <div class="footer">
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Timeout In Progress</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="resetTimer()">↺ Reset</button>
      <button class="ctrl-btn" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
    </div>
    <div class="ipl-brand">IPL 2026 · Powered by CEAT</div>
  </div>

</div>

<!-- Particles -->
<script>
(function(){
  const colors = ['rgba(0,150,255,0.6)','rgba(0,100,200,0.4)','rgba(100,180,255,0.5)','rgba(240,192,0,0.3)'];
  for(let i=0;i<18;i++){
    const p = document.createElement('div');
    p.className='particle';
    const size = Math.random()*3+1;
    p.style.cssText=`
      width:${size}px; height:${size}px;
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${Math.random()*8+6}s;
      animation-delay:-${Math.random()*10}s;
    `;
    document.body.appendChild(p);
  }
})();
</script>

<!-- Tick marks -->
<script>
(function(){
  const g = document.getElementById('ticks');
  const cx=220, cy=220, r=207;
  for(let i=0;i<60;i++){
    const angle = (i/60)*Math.PI*2 - Math.PI/2;
    const isMajor = i%5===0;
    const r1 = r + (isMajor?8:4);
    const r2 = r + (isMajor?18:10);
    const x1 = cx + Math.cos(angle)*r1;
    const y1 = cy + Math.sin(angle)*r1;
    const x2 = cx + Math.cos(angle)*r2;
    const y2 = cy + Math.sin(angle)*r2;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke', isMajor ? 'rgba(0,180,255,0.5)' : 'rgba(0,120,200,0.25)');
    line.setAttribute('stroke-width', isMajor ? '2' : '1');
    line.setAttribute('stroke-linecap','round');
    g.appendChild(line);
  }
})();
</script>

<!-- Main timer logic -->
<script>
const TOTAL = 150; // 2:30
let remaining = TOTAL;
let paused = false;
let finished = false;
let interval = null;

const display = document.getElementById('timerDisplay');
const progressArc = document.getElementById('progressArc');
const scene = document.getElementById('scene');
const statusText = document.getElementById('statusText');
const pauseBtn = document.getElementById('pauseBtn');
const CIRC = 2*Math.PI*207;

function formatTime(s){
  const m = Math.floor(s/60);
  const sec = s%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function updateProgress(){
  const frac = remaining/TOTAL;
  const offset = CIRC * (1-frac);
  progressArc.style.strokeDashoffset = offset;
  progressArc.style.strokeDasharray = CIRC;
}

function tick(){
  if(paused||finished) return;
  remaining--;
  display.textContent = formatTime(remaining);
  updateProgress();

  // Urgency mode
  if(remaining <= 10 && remaining > 0){
    scene.classList.add('urgency-mode');
  }

  if(remaining <= 0){
    finished=true;
    clearInterval(interval);
    display.textContent='00:00';
    scene.classList.remove('urgency-mode');
    scene.classList.add('finished');
    statusText.textContent='TIMEOUT COMPLETE';
    pauseBtn.disabled=true;
    // Flash effect
    setTimeout(()=>{ scene.classList.remove('finished'); }, 3000);
  }
}

function resetTimer(){
  clearInterval(interval);
  remaining=TOTAL;
  paused=false;
  finished=false;
  display.textContent=formatTime(TOTAL);
  scene.classList.remove('urgency-mode','finished');
  scene.style.setProperty('--rock-speed','4s');
  statusText.textContent='Timeout In Progress';
  pauseBtn.textContent='⏸ Pause';
  pauseBtn.disabled=false;
  updateProgress();
  startInterval();
}

function togglePause(){
  if(finished) return;
  paused=!paused;
  pauseBtn.textContent = paused ? '▶ Resume' : '⏸ Pause';
  statusText.textContent = paused ? 'PAUSED' : 'Timeout In Progress';
  // Pause/resume tire spin
  const tireSpin = document.getElementById('tireSpin');
  tireSpin.style.animationPlayState = paused ? 'paused' : 'running';
  document.getElementById('rockWrapper').style.animationPlayState = paused ? 'paused' : 'running';
}

function startInterval(){
  interval = setInterval(tick, 1000);
}

// Init
updateProgress();
// Start after brief delay (dramatic entrance)
setTimeout(startInterval, 2000);
</script>
