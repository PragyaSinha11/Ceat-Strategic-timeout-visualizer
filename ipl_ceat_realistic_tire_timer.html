
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent}
.wrap{display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 1.5rem;gap:1.1rem}
.label-top{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:4px;color:#888;text-transform:uppercase}
.tire-scene{position:relative;width:360px;height:360px}
.tire-scene canvas{position:absolute;top:0;left:0}
.inner-hud{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none;
  animation:tireFlip 4s ease-in-out infinite;
}
@keyframes tireFlip{
  0%{transform:translate(-50%,-50%) perspective(600px) rotateY(0deg)}
  30%{transform:translate(-50%,-50%) perspective(600px) rotateY(180deg)}
  60%{transform:translate(-50%,-50%) perspective(600px) rotateY(180deg)}
  90%{transform:translate(-50%,-50%) perspective(600px) rotateY(360deg)}
  100%{transform:translate(-50%,-50%) perspective(600px) rotateY(360deg)}
}
.time-text{font-family:'Orbitron',monospace;font-weight:900;font-size:50px;color:#fff;line-height:1;letter-spacing:3px;text-shadow:0 2px 20px rgba(0,0,0,0.8)}
.time-text.urgent{color:#e8383a;animation:pulse .5s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:0.4}}
.sub-lbl{font-family:'Orbitron',monospace;font-size:9px;color:#FFD700;letter-spacing:3px;text-transform:uppercase}
.brand-row{display:flex;align-items:center;gap:9px;font-family:'Orbitron',monospace;font-weight:900;font-size:12px;letter-spacing:3px;color:#FFD700}
.dot{width:7px;height:7px;background:#e8383a;border-radius:50%}
.controls{display:flex;gap:12px}
.ctrl-btn{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;padding:10px 26px;border:1.5px solid;border-radius:4px;cursor:pointer;font-weight:700;text-transform:uppercase;transition:all .15s}
.btn-start{background:#e8383a;border-color:#e8383a;color:#fff}
.btn-start:hover{background:#c42c2e}
.btn-reset{background:transparent;border-color:#FFD700;color:#FFD700}
.btn-reset:hover{background:rgba(255,215,0,0.08)}
.status-bar{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:#555;text-transform:uppercase;min-height:16px}
.status-bar.live{color:#4caf50}
.status-bar.done{color:#e8383a}
</style>

<div class="wrap">
  <div class="label-top">CEAT Tyres · Strategic Timeout</div>

  <div class="tire-scene">
    <canvas id="bg" width="360" height="360"></canvas>
    <canvas id="spin" width="360" height="360"></canvas>
    <div class="inner-hud">
      <span id="td" class="time-text">2:30</span>
      <span class="sub-lbl">Timeout</span>
    </div>
  </div>

  <div class="brand-row"><div class="dot"></div>Strategic Timeout<div class="dot"></div></div>
  <div class="controls">
    <button class="ctrl-btn btn-start" id="sb" onclick="toggleTimer()">Start</button>
    <button class="ctrl-btn btn-reset" onclick="resetTimer()">Reset</button>
  </div>
  <div class="status-bar" id="stb">Ready</div>
</div>

<script>
const bgC = document.getElementById('bg');
const spC = document.getElementById('spin');
const bgX = bgC.getContext('2d');
const spX = spC.getContext('2d');
const W=360, H=360, CX=180, CY=180;
const TOTAL=150;
let remaining=TOTAL, running=false, interval=null;
let spinAngle=0, raf=null;

function drawBg(prog){
  bgX.clearRect(0,0,W,H);

  // ---- outer rubber tire body ----
  const outerR=162, innerR=100;

  // sidewall shadow bottom
  bgX.beginPath();
  bgX.arc(CX,CY+6,outerR+4,0,Math.PI*2);
  bgX.fillStyle='rgba(0,0,0,0.18)';
  bgX.fill();

  // main tire rubber - deep black
  bgX.beginPath();
  bgX.arc(CX,CY,outerR,0,Math.PI*2);
  bgX.fillStyle='#0d0d0d';
  bgX.fill();

  // tread band highlight (top-left light like reference)
  const treadGrad=bgX.createRadialGradient(CX-55,CY-55,30,CX,CY,outerR);
  treadGrad.addColorStop(0,'rgba(110,110,110,0.18)');
  treadGrad.addColorStop(0.5,'rgba(50,50,50,0.06)');
  treadGrad.addColorStop(1,'rgba(0,0,0,0)');
  bgX.beginPath();
  bgX.arc(CX,CY,outerR,0,Math.PI*2);
  bgX.fillStyle=treadGrad;
  bgX.fill();

  // tread grooves - concentric rings on the tread band
  const grooves=[
    {r:163,w:2.5,a:0.6},{r:157,w:1.5,a:0.4},{r:152,w:2,a:0.5},
    {r:147,w:1.5,a:0.35},{r:142,w:2,a:0.45},{r:137,w:1.5,a:0.3},
    {r:132,w:2.5,a:0.5},{r:127,w:1.5,a:0.3},{r:122,w:1.5,a:0.25},
    {r:117,w:2,a:0.4},{r:112,w:1.5,a:0.25},{r:107,w:2,a:0.35},
    {r:103,w:1.5,a:0.2}
  ];
  grooves.forEach(g=>{
    bgX.beginPath();
    bgX.arc(CX,CY,g.r,0,Math.PI*2);
    bgX.strokeStyle=`rgba(0,0,0,${g.a})`;
    bgX.lineWidth=g.w;
    bgX.stroke();
  });

  // lateral tread cuts - radial slashes like real tire
  for(let i=0;i<72;i++){
    const a=(i/72)*Math.PI*2;
    const r1=103, r2=162;
    const x1=CX+Math.cos(a)*r1, y1=CY+Math.sin(a)*r1;
    const x2=CX+Math.cos(a)*r2, y2=CY+Math.sin(a)*r2;
    bgX.beginPath();
    bgX.moveTo(x1,y1);
    bgX.lineTo(x2,y2);
    bgX.strokeStyle='rgba(0,0,0,0.55)';
    bgX.lineWidth=1.2;
    bgX.stroke();
  }

  // shoulder curve highlight (upper left)
  const shoulderGrad=bgX.createLinearGradient(CX-100,CY-100,CX+60,CY+60);
  shoulderGrad.addColorStop(0,'rgba(160,160,160,0.12)');
  shoulderGrad.addColorStop(0.4,'rgba(80,80,80,0.05)');
  shoulderGrad.addColorStop(1,'rgba(0,0,0,0)');
  bgX.beginPath();
  bgX.arc(CX,CY,outerR,0,Math.PI*2);
  bgX.fillStyle=shoulderGrad;
  bgX.fill();

  // CEAT sidewall text
  bgX.save();
  bgX.font='900 13px Arial Black,sans-serif';
  bgX.fillStyle='#FFD700';
  bgX.textAlign='center';
  bgX.textBaseline='middle';
  bgX.translate(CX,CY);
  bgX.rotate(-Math.PI*0.28);
  bgX.fillText('CEAT',0,-138);
  bgX.restore();

  bgX.save();
  bgX.font='700 7px Arial,sans-serif';
  bgX.fillStyle='rgba(160,160,160,0.6)';
  bgX.textAlign='center';
  bgX.textBaseline='middle';
  bgX.translate(CX,CY);
  bgX.rotate(Math.PI*0.22);
  bgX.fillText('STEEL RADIAL',0,-130);
  bgX.restore();

  // rim seat circle (rim-tire boundary)
  bgX.beginPath();
  bgX.arc(CX,CY,innerR+2,0,Math.PI*2);
  bgX.strokeStyle='#1a1a1a';
  bgX.lineWidth=4;
  bgX.stroke();

  // ---- ALLOY RIM ----
  // rim face base - dark gunmetal like reference
  bgX.beginPath();
  bgX.arc(CX,CY,innerR,0,Math.PI*2);
  const rimGrad=bgX.createRadialGradient(CX-30,CY-30,5,CX,CY,innerR);
  rimGrad.addColorStop(0,'#6a6a6a');
  rimGrad.addColorStop(0.3,'#555');
  rimGrad.addColorStop(0.7,'#3a3a3a');
  rimGrad.addColorStop(1,'#282828');
  bgX.fillStyle=rimGrad;
  bgX.fill();

  // rim outer ring lip
  bgX.beginPath();
  bgX.arc(CX,CY,innerR,0,Math.PI*2);
  bgX.strokeStyle='rgba(120,120,120,0.5)';
  bgX.lineWidth=3;
  bgX.stroke();

  // progress arc track
  const arcR=innerR-14;
  bgX.beginPath();
  bgX.arc(CX,CY,arcR,0,Math.PI*2);
  bgX.strokeStyle='rgba(0,0,0,0.5)';
  bgX.lineWidth=10;
  bgX.stroke();

  // progress arc filled
  if(prog>0){
    const arcColor=prog>0.5?'#e8383a':prog>0.2?'#FFD700':'#e8383a';
    bgX.beginPath();
    bgX.arc(CX,CY,arcR,-Math.PI/2,-Math.PI/2+Math.PI*2*prog);
    bgX.strokeStyle=arcColor;
    bgX.lineWidth=10;
    bgX.lineCap='round';
    bgX.stroke();
  }
}

function drawSpokes(angle){
  spX.clearRect(0,0,W,H);
  const innerR=100, hubR=22, spokeIn=26, spokeOut=88;

  // 5 spokes like the reference image
  for(let i=0;i<5;i++){
    const a=angle+(i/5)*Math.PI*2;
    const a1=a-0.22, a2=a+0.22;

    // spoke body - trapezoidal like ref
    const ix1=CX+Math.cos(a1)*spokeIn, iy1=CY+Math.sin(a1)*spokeIn;
    const ix2=CX+Math.cos(a2)*spokeIn, iy2=CY+Math.sin(a2)*spokeIn;
    const ox1=CX+Math.cos(a1)*spokeOut, oy1=CY+Math.sin(a1)*spokeOut;
    const ox2=CX+Math.cos(a2)*spokeOut, oy2=CY+Math.sin(a2)*spokeOut;

    spX.beginPath();
    spX.moveTo(ix1,iy1);
    spX.lineTo(ox1,oy1);
    spX.lineTo(ox2,oy2);
    spX.lineTo(ix2,iy2);
    spX.closePath();
    const spGrad=spX.createLinearGradient(
      CX+Math.cos(a-0.3)*40,CY+Math.sin(a-0.3)*40,
      CX+Math.cos(a+0.3)*40,CY+Math.sin(a+0.3)*40
    );
    spGrad.addColorStop(0,'#3a3a3a');
    spGrad.addColorStop(0.4,'#595959');
    spGrad.addColorStop(1,'#2a2a2a');
    spX.fillStyle=spGrad;
    spX.fill();
    spX.strokeStyle='rgba(80,80,80,0.4)';
    spX.lineWidth=0.8;
    spX.stroke();

    // spoke highlight
    spX.beginPath();
    spX.moveTo(CX+Math.cos(a)*spokeIn+Math.cos(a-Math.PI/2)*1.5, CY+Math.sin(a)*spokeIn+Math.sin(a-Math.PI/2)*1.5);
    spX.lineTo(CX+Math.cos(a)*spokeOut+Math.cos(a-Math.PI/2)*1.5, CY+Math.sin(a)*spokeOut+Math.sin(a-Math.PI/2)*1.5);
    spX.strokeStyle='rgba(180,180,180,0.2)';
    spX.lineWidth=2;
    spX.stroke();
  }

  // between-spoke windows (dark recesses)
  for(let i=0;i<5;i++){
    const a=angle+(i/5)*Math.PI*2+Math.PI/5;
    const midA=a, r1=30, r2=82;
    spX.beginPath();
    spX.moveTo(CX+Math.cos(midA-0.25)*r1,CY+Math.sin(midA-0.25)*r1);
    spX.arc(CX,CY,r2,midA-0.32,midA+0.32);
    spX.arc(CX,CY,r1,midA+0.25,midA-0.25,true);
    spX.closePath();
    spX.fillStyle='rgba(0,0,0,0.7)';
    spX.fill();
  }

  // center hub cap
  spX.beginPath();
  spX.arc(CX,CY,hubR,0,Math.PI*2);
  const hubGrad=spX.createRadialGradient(CX-6,CY-6,2,CX,CY,hubR);
  hubGrad.addColorStop(0,'#686868');
  hubGrad.addColorStop(0.5,'#424242');
  hubGrad.addColorStop(1,'#222');
  spX.fillStyle=hubGrad;
  spX.fill();
  spX.strokeStyle='rgba(100,100,100,0.6)';
  spX.lineWidth=1.5;
  spX.stroke();

  // hub bolts - 5 like reference
  for(let i=0;i<5;i++){
    const a=angle+(i/5)*Math.PI*2;
    const bx=CX+Math.cos(a)*13, by=CY+Math.sin(a)*13;
    spX.beginPath();
    spX.arc(bx,by,3.5,0,Math.PI*2);
    spX.fillStyle='#111';
    spX.fill();
    spX.strokeStyle='rgba(120,120,120,0.5)';
    spX.lineWidth=1;
    spX.stroke();
  }

  // center logo dot
  spX.beginPath();
  spX.arc(CX,CY,5,0,Math.PI*2);
  spX.fillStyle='#FFD700';
  spX.fill();
}

function frame(){
  spinAngle += running ? 0.035 : 0.006;
  const prog = remaining/TOTAL;
  drawBg(prog);
  drawSpokes(spinAngle);
  raf=requestAnimationFrame(frame);
}

frame();

function updateDisplay(){
  const m=Math.floor(remaining/60), s=remaining%60;
  const td=document.getElementById('td');
  td.textContent=m+':'+String(s).padStart(2,'0');
  td.className='time-text'+(remaining/TOTAL<=0.2?' urgent':'');
}

function toggleTimer(){
  if(remaining===0) return;
  running=!running;
  const sb=document.getElementById('sb'),stb=document.getElementById('stb');
  if(running){
    sb.textContent='Pause';stb.textContent='● Live';stb.className='status-bar live';
    interval=setInterval(()=>{
      if(remaining>0){remaining--;updateDisplay();}
      if(remaining===0){
        clearInterval(interval);running=false;
        sb.textContent='Start';stb.textContent='Timeout Over!';stb.className='status-bar done';
      }
    },1000);
  } else {
    clearInterval(interval);sb.textContent='Resume';stb.textContent='Paused';stb.className='status-bar';
  }
}

function resetTimer(){
  clearInterval(interval);running=false;remaining=TOTAL;
  document.getElementById('sb').textContent='Start';
  document.getElementById('stb').textContent='Ready';
  document.getElementById('stb').className='status-bar';
  updateDisplay();
}

updateDisplay();
</script>
